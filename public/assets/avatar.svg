<svg width="128" height="128" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient Definition -->
  <defs>
    <linearGradient id="avatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d946ef" /> <!-- Lighter Fuchsia -->
      <stop offset="100%" stop-color="#9333ea" /> <!-- Darker Purple -->
    </linearGradient>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="50" fill="url(#avatarGradient)" />

  <!-- User Head -->
  <circle cx="50" cy="38" r="13" fill="white" />

  <!-- User Body -->
  <!-- Using a path to create the rounded shoulder/mount shape -->
  <path d="M24 82C24 64 34 56 50 56C66 56 76 64 76 82H24Z" fill="white" />
</svg>